name: Build ZNP CC2530 with SBL

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      profile:
        description: SDCC profile
        required: false
        default: balanced

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y cmake jq patch xz-utils

      - name: Configure Firmware Build
        shell: bash
        run: |
          set -euxo pipefail
          PROFILE="${{ github.event.inputs.profile }}"
          if [ -z "$PROFILE" ]; then
            PROFILE=balanced
          fi
          cmake -S . -B build -DZSTACK_PROFILE="$PROFILE"

      - name: Build Firmware
        shell: bash
        run: |
          set -euxo pipefail
          cmake --build build --parallel

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: znp-cc2530-with-sbl-${{ github.event.inputs.profile || 'balanced' }}
          path: build/out/znp_cc2530_with_sbl/
          if-no-files-found: error
