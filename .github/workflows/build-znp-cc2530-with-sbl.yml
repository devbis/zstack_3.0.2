name: Build ZNP CC2530 with SBL

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      profile:
        description: SDCC profile
        required: false
        default: balanced

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y jq patch xz-utils

      - name: Build Firmware
        shell: bash
        run: |
          set -euxo pipefail
          PROFILE="${{ github.event.inputs.profile }}"
          if [ -z "$PROFILE" ]; then
            PROFILE=balanced
          fi
          chmod +x ./ci/build_znp_cc2530_with_sbl.sh
          ZNP_SDCC_PROFILE="$PROFILE" ./ci/build_znp_cc2530_with_sbl.sh

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: znp-cc2530-with-sbl-${{ github.event.inputs.profile || 'balanced' }}
          path: out/znp_cc2530_with_sbl/
          if-no-files-found: error
