name: Build ZNP CC2530 with SBL

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      profile:
        description: SDCC profile
        required: false
        default: balanced

env:
  SDCC_TOOLCHAIN_ROOT: ""
  SDCC_TOOLCHAIN_URL: "https://github.com/devbis/sdcc_iar/releases/download/20260428/sdcc-linux-amd64.tar.xz"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y cmake jq patch xz-utils

      - name: Prepare SDCC Toolchain
        shell: bash
        run: |
          set -euxo pipefail
          TOOLCHAIN_WORK="$RUNNER_TEMP/sdcc-toolchain"
          TOOLCHAIN_TARBALL="$TOOLCHAIN_WORK/sdcc-toolchain.tar.xz"
          TOOLCHAIN_RAW="$TOOLCHAIN_WORK/raw"
          TOOLCHAIN_OVERLAY="$TOOLCHAIN_WORK/overlay"
          mkdir -p "$TOOLCHAIN_WORK"
          curl -L "$SDCC_TOOLCHAIN_URL" -o "$TOOLCHAIN_TARBALL"
          rm -rf "$TOOLCHAIN_RAW" "$TOOLCHAIN_OVERLAY"
          mkdir -p "$TOOLCHAIN_RAW" "$TOOLCHAIN_OVERLAY"
          tar -xf "$TOOLCHAIN_TARBALL" -C "$TOOLCHAIN_RAW"

          REAL_TOOLCHAIN_ROOT=""
          if [ -x "$TOOLCHAIN_RAW/bin/sdcc" ]; then
            REAL_TOOLCHAIN_ROOT="$TOOLCHAIN_RAW"
          else
            while IFS= read -r candidate; do
              if [ -x "$candidate/bin/sdcc" ]; then
                REAL_TOOLCHAIN_ROOT="$candidate"
                break
              fi
            done < <(find "$TOOLCHAIN_RAW" -mindepth 1 -maxdepth 2 -type d | sort)
          fi

          if [ -z "$REAL_TOOLCHAIN_ROOT" ]; then
            echo "Unable to locate extracted SDCC toolchain root" >&2
            exit 1
          fi

          cp -a "$REAL_TOOLCHAIN_ROOT"/. "$TOOLCHAIN_OVERLAY"/
          cp cmake/sdcpp.in "$TOOLCHAIN_OVERLAY/bin/sdcpp"
          chmod +x "$TOOLCHAIN_OVERLAY/bin/sdcpp"
          echo "SDCC_TOOLCHAIN_ROOT=$TOOLCHAIN_OVERLAY" >> "$GITHUB_ENV"

      - name: Import IAR Project Bundle
        shell: bash
        run: |
          set -euxo pipefail
          PROFILE="${{ github.event.inputs.profile }}"
          if [ -z "$PROFILE" ]; then
            PROFILE=balanced
          fi
          IMPORT_DIR="$RUNNER_TEMP/znp-import/$PROFILE"
          python3 z-stack_3.0.2/Tools/sdcc/iar_import.py \
            --project z-stack_3.0.2/Projects/zstack/ZNP/CC253x/CC2530.ewp \
            --config ZNP-with-SBL \
            --profile "$PROFILE" \
            --out-dir "$IMPORT_DIR" \
            --patch firmware_CC2531_CC2530.patch
          echo "ZSTACK_IMPORT_BUNDLE_DIR=$IMPORT_DIR" >> "$GITHUB_ENV"

      - name: Configure Firmware Build
        shell: bash
        run: |
          set -euxo pipefail
          PROFILE="${{ github.event.inputs.profile }}"
          if [ -z "$PROFILE" ]; then
            PROFILE=balanced
          fi
          cmake -S . -B build \
            -DZSTACK_PROFILE="$PROFILE" \
            -DZSTACK_IMPORT_BUNDLE_DIR="$ZSTACK_IMPORT_BUNDLE_DIR" \
            -DSDCC_TOOLCHAIN_ROOT="$SDCC_TOOLCHAIN_ROOT"

      - name: Build Firmware
        shell: bash
        run: |
          set -euxo pipefail
          cmake --build build --parallel

      - name: Build HEX Target
        shell: bash
        run: |
          set -euxo pipefail
          cmake --build build --target znp_cc2530_with_sbl_hex --parallel

      - name: Print Build Summary
        shell: bash
        run: |
          set -euxo pipefail
          PROFILE="${{ github.event.inputs.profile }}"
          if [ -z "$PROFILE" ]; then
            PROFILE=balanced
          fi
          SUMMARY=build/out/znp_cc2530_with_sbl/"$PROFILE"/build-summary.txt
          if [ -f "$SUMMARY" ]; then
            cat "$SUMMARY"
          else
            echo "Build summary not found: $SUMMARY" >&2
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: znp-cc2530-with-sbl-${{ github.event.inputs.profile || 'balanced' }}
          path: build/out/znp_cc2530_with_sbl/
          if-no-files-found: error
